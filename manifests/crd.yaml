apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: fournoscluster.fournos.dev
spec:
  group: fournos.dev
  names:
    kind: FournosCluster
    listKind: FournosClusterList
    plural: fournoscluster
    singular: fournoscluster
    shortNames:
      - fc
      - fcluster
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Owner
          type: string
          jsonPath: .spec.owner
        - name: GPUs
          type: string
          jsonPath: .status.gpuSummary
        - name: Kubeconfig
          type: string
          jsonPath: .status.kubeconfigStatus
        - name: Locked
          type: boolean
          jsonPath: .status.locked
        - name: Lock Job
          type: string
          jsonPath: .status.lockJobName
          priority: 1
        - name: TTL
          type: string
          jsonPath: .spec.ttl
          priority: 1
        - name: Lock Expires
          type: string
          jsonPath: .status.lockExpiresAt
          priority: 1
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - kubeconfigSecret
              properties:
                kubeconfigSecret:
                  type: string
                  description: >-
                    Name of the K8s Secret holding the kubeconfig for this
                    target cluster. Must exist in the secrets namespace.
                owner:
                  type: string
                  description: >-
                    Person or team claiming exclusive ownership. When set,
                    the controller creates a sentinel FournosJob that holds
                    all cluster-slot quota, blocking other jobs. Clear to release.
                ttl:
                  type: string
                  pattern: "^[0-9]+(m|h|d)$"
                  description: >-
                    Duration for auto-expiry of ownership (e.g. "4h", "30m", "2d").
                    Ignored when owner is not set.
                gpuDiscoveryInterval:
                  type: string
                  pattern: "^[0-9]+(m|h|d)$"
                  default: "5m"
                  description: >-
                    How often to probe the target cluster for GPU hardware.
                    Defaults to 5 minutes.
                hardware:
                  type: object
                  description: >-
                    Discovered GPU hardware inventory. Written by the controller
                    after probing the target cluster. Changes trigger ClusterQueue
                    quota updates reactively.
                  properties:
                    gpus:
                      type: array
                      items:
                        type: object
                        properties:
                          vendor:
                            type: string
                          model:
                            type: string
                          shortName:
                            type: string
                          count:
                            type: integer
                          nodeCount:
                            type: integer
                    totalGPUs:
                      type: integer
                    lastDiscovery:
                      type: string
                      format: date-time
                    consecutiveFailures:
                      type: integer
                    lastError:
                      type: string
            status:
              type: object
              properties:
                kubeconfigStatus:
                  type: string
                  enum:
                    - Valid
                    - Missing
                    - Invalid
                    - Unreachable
                locked:
                  type: boolean
                lockExpiresAt:
                  type: string
                  format: date-time
                ownerSetAt:
                  type: string
                  format: date-time
                lockJobName:
                  type: string
                  description: >-
                    Name of the sentinel FournosJob holding cluster quota
                    while the cluster is locked.
                gpuSummary:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    required:
                      - type
                      - status
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
