apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: hearth
rules:
  # kopf framework
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]
  # FournosCluster CRD
  - apiGroups: ["fournos.dev"]
    resources: ["fournosclusters", "fournosclusters/status", "fournosclusters/finalizers"]
    verbs: ["create", "get", "list", "watch", "patch", "update"]
  # Sentinel FournosJob for cluster locking
  - apiGroups: ["fournos.dev"]
    resources: ["fournosjobs"]
    verbs: ["create", "get", "delete"]
  # kopf annotations on secrets (patch only, scoped via Role in psap-secrets)
  # Cluster-wide secret rules removed — see secrets-role.yaml
  # Events
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create"]
  # Kueue
  - apiGroups: ["kueue.x-k8s.io"]
    resources: ["resourceflavors"]
    verbs: ["create", "get", "list", "delete"]
  - apiGroups: ["kueue.x-k8s.io"]
    resources: ["clusterqueues"]
    verbs: ["get", "list", "patch"]
  - apiGroups: ["kueue.x-k8s.io"]
    resources: ["workloadpriorityclasses"]
    verbs: ["get", "list", "watch"]
