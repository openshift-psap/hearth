apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: hearth
  namespace: hearth
spec:
  lookupPolicy:
    local: true
  tags:
    - name: latest
      from:
        kind: DockerImage
        name: quay.io/rh_perfscale/hearth:latest
      importPolicy:
        scheduled: true
      referencePolicy:
        type: Source
